name: HTML Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Create package.json
        run: |
          echo '{
            "devDependencies": {
              "html-validate": "^8.0.0"
            }
          }' > package.json
      - name: Install dependencies
        run: npm install
      - name: Validate HTML
        run: npx html-validate app/index.html