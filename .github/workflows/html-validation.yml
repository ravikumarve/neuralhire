name: HTML Validation\n\non:\n  push:\n    branches: [ main ]\n  pull_request:\n    branches: [ main ]\n\njobs:\n  validate-html:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Set up Node.js\n        uses: actions/setup-node@v3\n        with:\n          node-version: '20'\n      - name: Create package.json\n        run: |\n          echo '{\n            \"devDependencies\": {\n              \"html-validate\": \"^8.0.0\"\n            }\n          }' > package.json\n      - name: Install dependencies\n        run: npm install\n      - name: Validate HTML\n        run: npx html-validate app/index.html